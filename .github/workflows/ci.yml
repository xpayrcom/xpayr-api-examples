name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - run: npm test
      - run: bash -n examples/curl/create-payment.sh
      - run: python3 -m py_compile examples/python/create_payment.py
      - run: php -l examples/php/create-payment.php && php -l examples/webhook/verify-php.php
