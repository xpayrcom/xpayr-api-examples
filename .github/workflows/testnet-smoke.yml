name: XPayr Testnet smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'

permissions:
  contents: read

concurrency:
  group: xpayr-api-testnet-smoke
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: testnet-smoke
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run validate
      - run: npm run smoke:testnet
        env:
          XPAYR_TEST_SECRET_KEY: ${{ secrets.XPAYR_TEST_SECRET_KEY }}
          XPAYR_SMOKE_OUTPUT: ${{ runner.temp }}/xpayr-api-smoke.json
      - uses: actions/upload-artifact@v4
        with:
          name: xpayr-api-testnet-smoke
          path: ${{ runner.temp }}/xpayr-api-smoke.json
          retention-days: 14
